<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="preconnect" href="https://js.stripe.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <title>checkout · localharness</title>
  <link rel="stylesheet" href="./styles.css" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>
<body>
<!--
  Dedicated, WASM-FREE checkout page. The heavy localharness app (~4.6 MB wasm)
  and Stripe's Payment Element iframes can't coexist in one iOS Safari WebContent
  process without an out-of-memory kill (gray screen + reload ~10s after the card
  mounts). So the card form lives HERE, on a page that loads NO wasm: the app
  fetches the PaymentIntent client_secret (it holds the identity key), navigates
  here with it in the URL fragment, we mount Stripe + confirm, then navigate back
  to the app with ?bought=1&pi=… for the on-chain mint. No inline app code —
  pay.js is external so script-src 'self' stays clean. ?v= is the per-build
  cache-buster (stamped by scripts/build-web.sh).
-->
<main style="max-width:460px;margin:0 auto;padding:24px 16px;min-height:100dvh;display:flex;flex-direction:column;justify-content:center;gap:10px">
  <div style="font-size:13px;letter-spacing:.04em;color:#9a9a9a">secure checkout</div>
  <div id="pay-amount" style="font-size:18px;color:#e6e6e6;margin-bottom:4px"></div>
  <div id="lh-payment" style="margin:6px 0"></div>
  <button id="lh-pay-button" type="button" class="apex-onboard-cta" style="display:none;width:100%;margin:8px 0 0">pay</button>
  <div id="lh-pay-error" role="alert" aria-live="assertive" style="color:#ff6b6b;font-size:12px;min-height:1em;margin:4px 0"></div>
  <div id="pay-done" style="display:none;color:#9a9a9a;font-size:13px">✓ payment received — returning…</div>
  <a href="/" style="color:#9a9a9a;font-size:12px;text-decoration:none;margin-top:8px">cancel</a>
</main>
<script src="./pay.js?v=bc0c1e6940e3"></script>
</body>
</html>
