<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>localharness · web demo</title>
  <style>
    :root {
      color-scheme: dark light;
      --bg: #0b0d12;
      --panel: #14181f;
      --panel-2: #1a1f29;
      --border: #232a36;
      --fg: #e6e9ee;
      --muted: #7a8493;
      --accent: #76d9b9;
      --user: #6aa7ff;
      --error: #ff8b8b;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--fg);
      font: 14px/1.55 ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;
    }
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 32px 24px 160px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 32px;
    }
    main > .col-chat { min-width: 0; }
    main > .col-fs {
      position: sticky;
      top: 32px;
      align-self: start;
      max-height: calc(100vh - 64px);
      display: flex;
      flex-direction: column;
    }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      main > .col-fs { position: static; max-height: none; }
    }
    header {
      display: flex; align-items: baseline; gap: 12px;
      margin-bottom: 4px;
    }
    h1 {
      font-size: 16px; font-weight: 600;
      letter-spacing: 0.02em;
      margin: 0;
    }
    .tag {
      font-size: 11px; color: var(--accent);
      border: 1px solid var(--accent);
      padding: 1px 6px; border-radius: 3px;
    }
    .sub { color: var(--muted); margin: 0 0 24px; font-size: 12px; }

    .row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
    input, textarea {
      background: var(--panel); color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      font: inherit;
      outline: none;
    }
    .key-row { display: flex; gap: 6px; }
    .key-row input { flex: 1; min-width: 0; }
    #keymeta { color: var(--muted); font-weight: 400; text-transform: none; letter-spacing: 0; margin-left: 6px; }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { min-height: 72px; resize: vertical; }
    .actions { display: flex; gap: 8px; align-items: center; }
    button {
      background: var(--accent); color: #0b0d12;
      border: 0; border-radius: 6px;
      padding: 10px 16px;
      font: inherit; font-weight: 600;
      cursor: pointer;
    }
    button.ghost {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border);
    }
    button.ghost:hover { color: var(--fg); border-color: var(--fg); }
    button[disabled] { opacity: 0.5; cursor: not-allowed; }

    .transcript {
      margin-top: 24px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .turn {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
    }
    .turn.user { background: var(--panel-2); border-left: 2px solid var(--user); }
    .turn.assistant { border-left: 2px solid var(--accent); }
    .turn .role {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .turn.user .role { color: var(--user); }
    .turn.assistant .role { color: var(--accent); }
    .turn .body {
      word-break: break-word;
    }
    .turn.user .body { white-space: pre-wrap; }
    .turn.assistant .body .text-segment { white-space: pre-wrap; }
    .turn.streaming .role::after {
      content: " · streaming";
      color: var(--muted);
    }

    /* Inline tool-call blocks inside an assistant turn. */
    .tool-call {
      margin: 8px 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      font-size: 12.5px;
      overflow: hidden;
    }
    .tool-call > summary {
      cursor: pointer;
      padding: 6px 10px;
      color: var(--muted);
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }
    .tool-call > summary::-webkit-details-marker { display: none; }
    .tool-call > summary::before {
      content: "▸";
      color: var(--muted);
      font-size: 10px;
      transition: transform 80ms ease;
    }
    .tool-call[open] > summary::before { transform: rotate(90deg); }
    .tool-call .tc-name {
      color: var(--fg);
      font-weight: 600;
    }
    .tool-call .tc-status {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
    }
    .tool-call .tc-status.running::before { content: "⋯ running"; }
    .tool-call .tc-status.ok::before { content: "✓ done"; color: var(--accent); }
    .tool-call .tc-status.err::before { content: "✗ error"; color: var(--error); }
    .tool-call .tc-body {
      padding: 8px 10px 10px;
      border-top: 1px solid var(--border);
      display: grid;
      gap: 8px;
    }
    .tool-call .tc-section-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .tool-call pre {
      margin: 0;
      padding: 6px 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow-x: auto;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .tool-call .tc-error pre {
      border-color: var(--error);
      color: var(--error);
    }

    .status { color: var(--muted); font-size: 11px; margin-top: 10px; min-height: 16px; }
    .err { color: var(--error); }

    footer { color: var(--muted); font-size: 11px; margin-top: 48px; line-height: 1.6; }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* OPFS panel */
    .fs-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }
    .fs-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .fs-title {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .fs-actions { display: flex; gap: 6px; }
    .fs-actions button {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      font: 11px ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;
      cursor: pointer;
    }
    .fs-actions button:hover { color: var(--fg); border-color: var(--fg); }
    .fs-breadcrumb {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      word-break: break-all;
    }
    .fs-breadcrumb a {
      color: var(--accent);
      cursor: pointer;
      text-decoration: none;
    }
    .fs-breadcrumb a:hover { text-decoration: underline; }
    .fs-list {
      flex: 1;
      overflow-y: auto;
      margin: 0;
      padding: 0;
      list-style: none;
      border-top: 1px solid var(--border);
    }
    .fs-list li {
      padding: 6px 4px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .fs-list li:hover { background: var(--panel-2); }
    .fs-list .name { color: var(--fg); }
    .fs-list .dir .name::before { content: "▸ "; color: var(--accent); }
    .fs-list .file .name::before { content: "· "; color: var(--muted); }
    .fs-list .size { color: var(--muted); font-size: 11px; }
    .fs-list .empty {
      color: var(--muted);
      font-style: italic;
      padding: 12px 4px;
      cursor: default;
    }
    .fs-list .empty:hover { background: transparent; }
    .fs-viewer {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-top: 10px;
      padding: 10px 12px;
      max-height: 240px;
      overflow: auto;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .fs-viewer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted);
    }
    .fs-viewer-header .close-viewer {
      background: transparent;
      color: var(--muted);
      border: 0;
      padding: 0;
      cursor: pointer;
      font: inherit;
    }
    .fs-viewer-header .close-viewer:hover { color: var(--fg); }
    .fs-viewer-actions { display: flex; gap: 6px; }
    textarea.fs-editor {
      min-height: 240px;
      max-height: 480px;
      resize: vertical;
      width: 100%;
      border-color: var(--accent);
      background: var(--bg);
      color: var(--fg);
      font: 12px ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;
    }
  </style>
</head>
<body>
<!--
  This page is intentionally a near-empty shell. All chrome, transcript,
  tool-call blocks, and the OPFS panel are rendered by Rust → maud
  templates inside the wasm bundle, and swapped into #root via
  set_inner_html. No JavaScript application code lives here.
-->

<script type="module">
  import init from "./pkg/localharness.js";
  await init();
</script>
</body>
</html>
