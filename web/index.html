<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- interactive-widget=resizes-content: on Chrome/Android the soft
       keyboard shrinks the layout viewport (so 100dvh shrinks too and the
       sticky header stays on-screen). iOS Safari ignores this directive;
       events.rs installs a visualViewport listener that drives --lh-vh /
       --lh-vv-top + the .lh-kb class to cover it.
       viewport-fit=cover: without it the notched-iPhone / installed-PWA
       status bar OVERLAPS the header (layout ignores the safe areas);
       styles.css pads the chrome with env(safe-area-inset-*), a no-op on
       devices without insets. -->
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,interactive-widget=resizes-content" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Warm the TLS connection to Stripe.js so the buy-$LH Elements modal opens fast. -->
  <link rel="preconnect" href="https://js.stripe.com" />
  <!-- Warm the connection to the $LH credit proxy so the first checkout POST
       (creating the PaymentIntent) doesn't pay a cold DNS + TLS handshake. -->
  <link rel="preconnect" href="https://proxy-tau-ten-15.vercel.app" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <title>localharness</title>
  <!--
    The Content-Security-Policy ships as Content-Security-Policy-Report-Only
    via an HTTP header in vercel.json (NOT here): in report-only mode the
    browser logs violations to the console without blocking, so a wrong
    directive can't brick the app. Validate against the running app, then
    flip the header name to `Content-Security-Policy` to enforce. The init
    script is external (boot.js) so enforcing `script-src 'self'` won't need
    'unsafe-inline'. X-Content-Type-Options: nosniff ships alongside it.
    Referrer-Policy is DELIBERATELY absent: a stricter referrer was the
    suspected breaker of BYOK Gemini keys carrying HTTP-referrer
    restrictions (commit c0393e0) — don't re-add it without testing that
    path against the live Gemini API.
  -->
  <link rel="stylesheet" href="./styles.css" />
  <!-- PWA: installable on Android (apex + every subdomain — same static
       bundle, so each origin installs as its own app). Monochrome theme. -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#000000" />
  <!-- Browser tab: crisp vector first, 32px PNG fallback for SVG-favicon
       holdouts. Glyph = real IBM Plex Mono SemiBold "lh" (brand wordmark). -->
  <link rel="icon" type="image/svg+xml" href="./icons/favicon.svg?v=aba62038f16b" />
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png?v=aba62038f16b" />
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png?v=aba62038f16b" />
  <!-- iOS Add-to-Home-Screen: standalone (no Safari chrome) + the icon. The
       per-AGENT name (apple-mobile-web-app-title / page title) is set in boot.js
       from the subdomain, so a main and its alts each install as their OWN app
       ("krafto", not "localharness"). The apex stays "localharness". -->
  <link rel="apple-touch-icon" href="./icons/icon-192.png?v=aba62038f16b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="localharness" />
</head>
<body>
<!--
  This page is intentionally a near-empty shell. All chrome, transcript,
  tool-call blocks, and the OPFS panel are rendered by Rust → maud
  templates inside the wasm bundle, and swapped into #root via
  set_inner_html. No JavaScript application code lives here.
-->
<div id="root"><div class="boot-loading">loading…</div></div>
<!-- ?v= is the per-build cache-buster (stamped by scripts/build-web.sh); it
     busts a stale-cached boot.js so a redeploy's new wasm url reaches returning
     visitors. index.html itself is the navigation document and revalidates. -->
<!-- Stripe Elements on-ramp shim (window.lhBuyLh) — loaded before boot so the
     wasm app can call it; ?v= cache-buster stamped by build-web.sh. -->
<script src="./stripe-embed.js?v=5da67476b6ec"></script>
<script type="module" src="./boot.js?v=5da67476b6ec"></script>
</body>
</html>
