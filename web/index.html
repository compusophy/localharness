<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>localharness · web demo</title>
  <style>
    :root {
      color-scheme: dark light;
      --bg: #0b0d12;
      --panel: #14181f;
      --panel-2: #1a1f29;
      --border: #232a36;
      --fg: #e6e9ee;
      --muted: #7a8493;
      --accent: #76d9b9;
      --user: #6aa7ff;
      --error: #ff8b8b;
    }
    * { box-sizing: border-box; }
    /* Desktop-app frame: viewport-bound, no page scroll. Border-
       radius is zero everywhere — the user wants the ultra-minimal
       look not the rounded chrome. */
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--fg);
      /* Single body size — 13px mono. Chrome (rails, panel-titles,
         buttons) uses 11px uppercase via class-specific rules. No
         third or fourth size anywhere. */
      font: 13px/1.5 ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;
      height: 100vh;
      overflow: hidden;
    }
    #root {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Global no-radius — wipes all the rounded corners across the
       app. Each component sets its own border-radius:0 explicitly
       too but this is the kill switch. */
    button, input, textarea, select, .tag, code,
    .fs-panel, .pricing-card, .financial-card, .header-admin-panel,
    .terminal-row, .key-row, .admin-address, .seed-words,
    .button-link, .turn, .tool-call, .visitor-banner {
      border-radius: 0 !important;
    }

    /* Custom monochrome scrollbar — thin, no rounding, blends with
       the panel background. Chromium + Firefox both styled. */
    * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    *::-webkit-scrollbar { width: 8px; height: 8px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb {
      background: var(--border);
      border: 2px solid var(--bg);
    }
    *::-webkit-scrollbar-thumb:hover { background: var(--muted); }
    *::-webkit-scrollbar-corner { background: transparent; }

    /* Sticky header — three zones via CSS grid:
       [brand left][subdomain center][admin right]. Each zone is its
       own column so the center stays centered even when the side
       widths differ. */
    .site-header {
      flex-shrink: 0;
      background: var(--bg);
      padding: 0;
      min-height: 40px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      width: 100%;
      padding: 4px 16px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
    }
    .header-brand { justify-self: start; }
    .header-center {
      justify-self: center;
      font-size: 12px;
      color: var(--muted);
      text-transform: lowercase;
      letter-spacing: 0.04em;
    }
    .header-admin { justify-self: end; position: relative; }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 32px 24px;
      flex: 1;
      width: 100%;
    }
    /* Tenant chrome — main is a horizontal row:
         [files-rail][col-fs][col-chat][col-financial][financial-rail]
       Files and agent rails span the FULL height of main. The center
       col-chat is itself a vertical stack of its own [view-rail][view-panel]
       [transcript][terminal-panel][terminal-rail] — so the view and
       terminal stay strictly inset between the files and agent columns.
       All four rails are <button>s; the whole strip is the click target. */
    main.layout {
      padding: 0;
      max-width: none;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      gap: 0;
      min-height: 0;          /* let children's overflow:auto kick in  */
      overflow: hidden;       /* prevent the page from growing with chat */
    }

    /* All four rails — identical visual treatment. Same thickness
       (32px), same label typography, same hover. The only difference
       is orientation (side rails rotate the label vertically). */
    main.layout .side-rail,
    main.layout .top-rail,
    main.layout .bottom-rail {
      background: transparent;
      color: var(--muted);
      border: 0;
      padding: 0;
      cursor: pointer;
      font: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    main.layout .side-rail:hover,
    main.layout .top-rail:hover,
    main.layout .bottom-rail:hover {
      background: var(--panel);
      color: var(--fg);
    }
    main.layout .rail-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    main.layout .side-rail {
      width: 32px;
    }
    main.layout .side-rail .rail-label {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
    }
    main.layout .top-rail,
    main.layout .bottom-rail {
      width: 100%;
      height: 32px;        /* matches side-rail width — same chrome */
    }
    main.layout .files-rail { border-right: 1px solid var(--border); }
    main.layout .financial-rail { border-left: 1px solid var(--border); }
    main.layout .top-rail { border-bottom: 1px solid var(--border); }
    main.layout .bottom-rail { border-top: 1px solid var(--border); }

    /* SSOT side-panel archetype — both files (col-fs) and agent
       (col-financial) share .col-side. Same width, same padding,
       same internal panel-header / panel-body treatment. The only
       difference is which border edge they use. */
    main.layout .col-side {
      flex-shrink: 0;
      width: 260px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;       /* contents handle their own overflow */
    }
    main.layout .col-fs { border-right: 1px solid var(--border); }
    main.layout .col-financial { border-left: 1px solid var(--border); }
    main.layout.files-collapsed .col-fs { display: none; }
    main.layout.financial-collapsed .col-financial { display: none; }
    .col-side .panel-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    .col-side .panel-title {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .col-side .panel-actions { display: flex; gap: 6px; }
    /* .col-side .panel-button now inherits from the global button
       style; no per-component overrides. */
    .col-side .panel-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Center column — vertical stack: view-rail / view-panel /
       transcript / terminal-panel / terminal-rail. Each panel
       collapses via a class flip on #layout. */
    main.layout .col-chat {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    main.layout .view-panel {
      flex-shrink: 0;
      max-height: 40%;
      overflow-y: auto;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    main.layout.view-collapsed .view-panel { display: none; }
    main.layout .terminal-panel {
      flex-shrink: 0;
      margin-top: auto;        /* always pin to bottom of col-chat */
      border-top: 1px solid var(--border);
    }
    /* Collapsing the terminal hides the WHOLE chat (transcript +
       input) — clears the column so the editor above can take
       the full vertical space. */
    main.layout.terminal-collapsed .terminal-panel,
    main.layout.terminal-collapsed .transcript { display: none; }
    main.layout.terminal-collapsed .view-panel { max-height: none; flex: 1; }

    /* Transcript fills available vertical space; scrolls internally.
       Newest pinned to bottom via the ::before flex spacer. */
    main.layout .transcript {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    main.layout .transcript > * { flex-shrink: 0; }
    main.layout .transcript::before {
      content: "";
      flex: 1;
    }

    /* Edit panel — the editable text surface that opens when a file
       is clicked in the file list. */
    .view-content { height: 100%; display: flex; flex-direction: column; }
    .editor { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .editor-header {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
    }
    .editor-path {
      font-size: 11px; color: var(--muted);
      text-transform: lowercase; word-break: break-all;
    }
    .editor-actions { display: flex; gap: 12px; }
    .editor-textarea {
      flex: 1; min-height: 0;
      background: var(--bg);
      border: 0; outline: none; resize: none;
      color: var(--fg);
      font: 13px/1.5 ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;
      padding: 12px 16px;
    }

    /* Mobile (<900px) — vertical stack. The page itself scrolls;
       terminal panel pins to the viewport bottom via position:fixed
       so it stays reachable no matter how long the content above is.
       Page gets bottom padding to keep the last content above the
       fixed terminal. */
    @media (max-width: 900px) {
      html, body { height: auto; overflow: auto; }
      #root { height: auto; min-height: 100vh; }
      main.layout {
        flex-direction: column;
        overflow: visible;
        min-height: 0;
        padding-bottom: 96px;   /* clearance for fixed terminal */
      }
      main.layout .side-rail {
        width: 100%; height: 32px;
      }
      main.layout .files-rail {
        border-right: 0; border-bottom: 1px solid var(--border);
      }
      main.layout .financial-rail {
        border-left: 0; border-top: 1px solid var(--border);
      }
      main.layout .side-rail .rail-label {
        writing-mode: horizontal-tb;
        transform: none;
      }
      main.layout .col-side {
        width: 100%;
        max-height: 40vh;
        overflow-y: auto;
      }
      main.layout .col-fs,
      main.layout .col-financial {
        border-right: 0; border-left: 0;
        border-bottom: 1px solid var(--border);
      }
      main.layout .col-chat {
        overflow: visible;
        min-height: auto;
      }
      main.layout .transcript {
        max-height: none;
        overflow: visible;
        padding-bottom: 32px;
      }
      /* Terminal panel + rail = sticky footer pinned to viewport
         bottom. Rail at the very bottom, panel sits above it when
         expanded. Page gets padding-bottom (above) so content
         doesn't slide under them. */
      main.layout .terminal-rail {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        height: 32px;
        z-index: 51;
        background: var(--bg);
        border-top: 1px solid var(--border);
      }
      main.layout .terminal-panel {
        position: fixed;
        bottom: 32px; left: 0; right: 0;
        z-index: 50;
        background: var(--bg);
        border-top: 1px solid var(--border);
        max-height: 50vh;
        overflow-y: auto;
        margin-top: 0;
      }
      main.layout.terminal-collapsed .terminal-panel { display: none; }
    }
    .apex-main { display: block; padding: 32px 24px; max-width: 1180px; }
    .apex-main > .col-chat { max-width: 600px; margin: 0 auto; }

    /* Terminal interior — bare prompt, no chrome. Status renders
       empty by default; only fills when there's something to say. */
    .terminal-body {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .terminal-status {
      font-size: 11px;
      color: var(--muted);
      min-height: 0;
    }
    .terminal-status:empty { display: none; }
    .terminal-status.err { color: var(--error); }
    .terminal-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 8px 12px;
    }
    .terminal-row:focus-within { border-color: var(--accent); }
    .terminal-prompt {
      color: var(--accent);
      font-weight: 600;
      user-select: none;
      line-height: 1;
    }
    .terminal-row textarea {
      flex: 1;
      background: transparent;
      border: 0;
      outline: none;
      resize: none;
      color: var(--fg);
      font: inherit;
      padding: 0;
      min-height: 20px;
      max-height: 240px;
      line-height: 1.4;
    }
    .terminal-send {
      padding: 0 8px;
      font-size: 16px;
      line-height: 1;
      flex-shrink: 0;
      background: transparent;
      color: var(--muted);
      border: 0;
      cursor: pointer;
    }
    .terminal-send:hover { color: var(--accent); }

    /* Financial column visuals */
    .financial-card,
    .financial-empty,
    .financial-placeholder {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .financial-placeholder { color: var(--muted); font-size: 11px; }
    .financial-empty { min-height: 0; }
    .financial-header { padding-bottom: 4px; border-bottom: 1px solid var(--border); }
    .financial-title {
      font-size: 11px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .financial-line {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 12px;
    }
    .financial-label {
      font-size: 11px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .financial-value { font-size: 12px; color: var(--fg); }
    .financial-balance { color: var(--accent); font-variant-numeric: tabular-nums; }
    .financial-tba {
      font-size: 12px; color: #f4c47e; text-decoration: none;
      font-variant-numeric: tabular-nums;
    }
    .financial-tba:hover { text-decoration: underline; }
    .financial-future {
      margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border);
      display: flex; flex-direction: column; gap: 4px;
    }
    .financial-future-title {
      font-size: 10px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .financial-future-line { font-size: 11px; color: var(--muted); }
    header { /* old in-flow header still used in unrelated templates */
      display: flex; align-items: baseline; gap: 12px;
      margin-bottom: 4px;
    }
    h1 {
      font-size: 16px; font-weight: 600;
      letter-spacing: 0.02em;
      margin: 0;
    }
    .tag {
      font-size: 11px; color: var(--accent);
      border: 1px solid var(--accent);
      padding: 1px 6px; border-radius: 3px;
    }
    .tenant-tag.tenant-tenant { color: #ffa86a; border-color: #ffa86a; }
    .tenant-tag.tenant-apex   { color: var(--muted); border-color: var(--border); }
    .tenant-tag.tenant-other  { color: var(--muted); border-color: var(--border); }

    .verify-pill.verify-pending      { color: var(--muted);  border-color: var(--border); }
    .verify-pill.verify-ok           { color: var(--accent); border-color: var(--accent); }
    .verify-pill.verify-visitor      { color: #6aa7ff; border-color: #6aa7ff; }
    .verify-pill.verify-unregistered { color: var(--muted);  border-color: var(--border); }
    .verify-pill.verify-failed       { color: var(--error);  border-color: var(--error); }
    .tba-pill { color: #f4c47e; border-color: #f4c47e; text-decoration: none; font-variant-numeric: tabular-nums; }
    .tba-pill:hover { background: rgba(244, 196, 126, 0.08); }

    /* Bare agents list — just subdomain names, no border / row chrome.
       Top-aligned on apex (margin handled by .step). */
    .agents-list { max-width: 480px; margin: 0 auto; }
    .agents-empty { display: none; }
    .agents-rows { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 4px; }
    .agent-row { text-align: center; }
    .agent-name {
      color: var(--fg);
      text-decoration: none;
      padding: 4px 8px;
      display: inline-block;
    }
    .agent-name:hover { color: var(--accent); }

    .claim-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 24px 0;
    }
    @media (max-width: 720px) { .claim-cards { grid-template-columns: 1fr; } }
    .claim-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
    }
    .claim-card.claim-primary { border-color: var(--accent); }
    .claim-card h3 {
      font-size: 14px; font-weight: 600; margin: 0 0 8px;
      color: var(--fg);
    }
    .claim-card.claim-primary h3 { color: var(--accent); }
    .claim-card p { margin: 0 0 12px; }
    .button-link {
      display: inline-block;
      background: var(--accent);
      color: #0b0d12;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 6px;
      font-weight: 600;
    }
    .button-link:hover { opacity: 0.9; }

    .visitor-banner {
      background: var(--panel);
      border: 1px solid #6aa7ff;
      border-radius: 6px;
      padding: 16px 18px;
      margin-bottom: 16px;
    }
    .visitor-banner h3 {
      margin: 0 0 8px; color: #6aa7ff;
      font-size: 14px; font-weight: 600;
    }
    .visitor-banner p { margin: 0 0 8px; color: var(--fg); }
    .visitor-banner code {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 3px; padding: 1px 5px;
      font-size: 12px; word-break: break-all;
    }
    .visitor-banner a { color: var(--accent); }

    h1 a { color: inherit; text-decoration: none; }
    h1 a:hover { color: var(--accent); }

    /* Apex / unclaimed chrome */
    .apex-main { padding-top: 64px; }
    .apex-hero { margin: 40px 0; }
    .apex-headline {
      font-size: 28px; font-weight: 600; letter-spacing: -0.01em;
      margin: 0 0 16px; color: var(--fg);
    }
    .apex-sub { color: var(--muted); margin: 0 0 32px; max-width: 56ch; line-height: 1.6; }
    .apex-form { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 20px; }
    .apex-input-row {
      display: flex; align-items: stretch; flex: 1; min-width: 240px;
      border: 1px solid var(--border); border-radius: 6px; overflow: hidden;
      background: var(--panel);
    }
    .apex-input-row input {
      flex: 1; min-width: 0; border: 0; background: transparent; padding: 12px 14px;
      color: var(--fg); font: inherit; outline: none;
    }
    .apex-input-row input:focus { background: var(--panel-2); }
    .apex-suffix {
      padding: 0 14px; display: flex; align-items: center;
      color: var(--muted); background: var(--panel-2); border-left: 1px solid var(--border);
      font-size: 13px;
    }
    .apex-form button[type="submit"], .apex-form button[type="button"] {
      padding: 12px 20px; font-weight: 600;
    }
    .apex-msg { width: 100%; font-size: 12px; min-height: 16px; margin-top: 6px; }
    .apex-fine { color: var(--muted); font-size: 12px; line-height: 1.6; }
    .apex-fine a { color: var(--accent); }
    .apex-details { margin: 24px 0; padding: 12px 16px; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; }
    .apex-details summary { cursor: pointer; color: var(--muted); font-size: 13px; user-select: none; }
    .apex-details summary:hover { color: var(--fg); }
    .apex-details[open] summary { color: var(--fg); margin-bottom: 12px; }
    .apex-import { display: grid; gap: 8px; }
    .apex-import textarea {
      min-height: 64px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 10px 12px; font: inherit; color: var(--fg); outline: none;
      resize: vertical;
    }
    .apex-import textarea:focus { border-color: var(--accent); }

    /* Apex wallet panel */
    .apex-wallet {
      margin-top: 48px; padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .apex-sub-headline {
      font-size: 18px; font-weight: 600; margin: 0 0 12px; color: var(--fg);
    }
    .wallet-address-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; background: var(--panel); border: 1px solid var(--border);
      border-radius: 6px; margin: 12px 0 16px;
    }
    .wallet-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--muted);
    }
    .wallet-address {
      font-size: 12.5px; color: var(--accent); word-break: break-all; flex: 1;
    }
    /* Identity sidecar (pre-identity state) */
    .identity-empty .apex-sub-headline { color: var(--accent); }
    .identity-actions {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px;
    }
    /* identity-actions buttons inherit the global button style */
    #import-slot:empty { display: none; }
    #import-slot.apex-import { margin-top: 16px; }
    /* Disabled claim form (pre-identity state) */
    .apex-input-row:has(input:disabled) { opacity: 0.5; }
    .apex-input-row input:disabled { cursor: not-allowed; }

    .seed-reveal { padding: 8px 0; }
    .seed-words {
      padding: 16px; margin: 8px 0;
      background: var(--bg); border: 1px solid var(--accent); border-radius: 6px;
      font-family: ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;
      font-size: 14px; color: var(--accent); line-height: 1.8;
      word-spacing: 0.5em; user-select: all;
    }
    .link-button {
      background: transparent; color: var(--accent); border: 0; padding: 0;
      font: inherit; cursor: pointer; text-decoration: underline;
    }
    .sub { color: var(--muted); margin: 0 0 24px; font-size: 12px; }

    .row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
    input, textarea {
      background: var(--panel); color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      font: inherit;
      outline: none;
    }
    .key-row { display: flex; gap: 6px; }
    .key-row input { flex: 1; min-width: 0; }
    #keymeta { color: var(--muted); font-weight: 400; text-transform: none; letter-spacing: 0; margin-left: 6px; }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { min-height: 72px; resize: vertical; }
    .actions { display: flex; gap: 8px; align-items: center; }
    /* SSOT button — every button in the app uses this archetype.
       Square, transparent, mono-uppercase. Hover lights up to --fg.
       Variants below tweak only specific overrides (danger, link),
       never the geometry. */
    button {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 5px 12px;
      font: inherit;
      font-size: 11px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
    }
    button:hover { color: var(--fg); border-color: var(--fg); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.ghost { /* legacy alias — same as base now */ }

    .transcript {
      margin-top: 24px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .turn {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
    }
    .turn.user { background: var(--panel-2); border-left: 2px solid var(--user); }
    .turn.assistant { border-left: 2px solid var(--accent); }
    .turn .role {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .turn.user .role { color: var(--user); }
    .turn.assistant .role { color: var(--accent); }
    .turn .body {
      word-break: break-word;
    }
    .turn.user .body { white-space: pre-wrap; }
    .turn.assistant .body .text-segment { white-space: pre-wrap; }
    .turn.streaming .role::after {
      content: " · streaming";
      color: var(--muted);
    }

    /* Inline tool-call blocks inside an assistant turn. */
    .tool-call {
      margin: 8px 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      font-size: 12.5px;
      overflow: hidden;
    }
    .tool-call > summary {
      cursor: pointer;
      padding: 6px 10px;
      color: var(--muted);
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }
    .tool-call > summary::-webkit-details-marker { display: none; }
    .tool-call > summary::before {
      content: "▸";
      color: var(--muted);
      font-size: 10px;
      transition: transform 80ms ease;
    }
    .tool-call[open] > summary::before { transform: rotate(90deg); }
    .tool-call .tc-name {
      color: var(--fg);
      font-weight: 600;
    }
    .tool-call .tc-status {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
    }
    .tool-call .tc-status.running::before { content: "⋯ running"; }
    .tool-call .tc-status.ok::before { content: "✓ done"; color: var(--accent); }
    .tool-call .tc-status.err::before { content: "✗ error"; color: var(--error); }
    .tool-call .tc-body {
      padding: 8px 10px 10px;
      border-top: 1px solid var(--border);
      display: grid;
      gap: 8px;
    }
    .tool-call .tc-section-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .tool-call pre {
      margin: 0;
      padding: 6px 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow-x: auto;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .tool-call .tc-error pre {
      border-color: var(--error);
      color: var(--error);
    }

    .status { color: var(--muted); font-size: 11px; margin-top: 10px; min-height: 16px; }
    .err { color: var(--error); }

    footer { color: var(--muted); font-size: 11px; margin-top: 48px; line-height: 1.6; }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* Header admin dropdown — sits at top-right, click to expand */
    .header-spacer { flex: 1; }
    .header-admin { position: relative; }
    /* .admin-button inherits the global button style now */
    .header-admin-panel {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      min-width: 320px;
      max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      z-index: 10;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }
    .admin-section { margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .admin-section:last-of-type { border-bottom: 0; padding-bottom: 0; margin-bottom: 8px; }
    .admin-section-title {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .admin-blurb { margin: 0 0 8px; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .admin-actions { display: flex; justify-content: flex-end; gap: 6px; }
    .admin-footer {
      display: flex; justify-content: space-between; align-items: center;
      gap: 8px; padding-top: 10px; margin-top: 6px;
      border-top: 1px solid var(--border);
    }
    .admin-version {
      font-size: 10px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .admin-address {
      display: block; padding: 8px 10px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
      font-size: 11px; color: var(--muted); word-break: break-all;
    }
    /* Danger variant only changes the colour — geometry stays the
       global button style. */
    button.danger { color: var(--error); border-color: var(--error); }
    button.danger:hover { color: var(--bg); background: var(--error); }
    .reset-confirm { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .reset-confirm-prompt { color: var(--error); font-size: 12px; }
    .reset-confirm-actions { display: flex; gap: 6px; }
    .opfs-wipe-confirm { display: inline-flex; gap: 4px; }

    /* Step-based apex onboarding */
    .step { margin: 48px 0 0; min-height: 200px; }
    .step-agents { margin-top: 48px; padding: 0 24px; }
    .step-identity .identity-actions {
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    /* identity-actions inherits the global button style */
    .step-msg { font-size: 12px; min-height: 16px; margin-top: 12px; color: var(--muted); }
    .seed-import { display: grid; gap: 8px; margin-top: 8px; }
    .seed-import textarea {
      min-height: 64px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 10px 12px; font: inherit; color: var(--fg);
    }
    .seed-import-actions { display: flex; gap: 8px; }

    /* Create-agent form (apex_step_agents) — input + button stacked,
       horizontally centered, equal padding above and below. Wide CTA
       button. */
    .create-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;          /* identical space above + below the input */
      max-width: 480px;
      margin: 64px auto 0;
    }
    .create-input {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--fg);
      font: inherit;
      padding: 12px 16px;
      outline: none;
      text-align: center;
    }
    .create-input:focus { border-color: var(--accent); }
    .create-button {
      min-width: 200px;
      padding: 12px 32px;
    }

    /* Unclaimed (fresh subdomain visited by someone who doesn't own it) */
    .step-unclaimed { text-align: center; }
    .unclaimed-name {
      font-size: 18px; font-weight: 600; color: var(--accent);
      margin: 0 0 16px; word-break: break-all;
    }

    .agents-empty { min-height: 0; }

    /* Pricing card — payment gate config, lives above the OPFS panel */
    .pricing-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    .pricing-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .pricing-title {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .pricing-value {
      color: #f4c47e;
      font-size: 14px;
      font-variant-numeric: tabular-nums;
      margin-bottom: 10px;
    }
    .pricing-edit {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .pricing-edit input {
      flex: 1; min-width: 80px;
      padding: 6px 8px;
      font-size: 12px;
      background: var(--bg);
    }
    .pricing-unit { color: var(--muted); font-size: 11px; }
    .pricing-edit button {
      padding: 6px 12px; font-size: 12px;
    }
    .pricing-msg { font-size: 11px; margin-top: 6px; min-height: 14px; }

    /* Files panel internals — the .fs-panel wrapper is gone (SSOT
       .col-side handles the chrome); these styles apply to the
       breadcrumb + list living inside .panel-body. */
    .fs-breadcrumb {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      word-break: break-all;
    }
    .fs-breadcrumb a {
      color: var(--accent);
      cursor: pointer;
      text-decoration: none;
    }
    .fs-breadcrumb a:hover { text-decoration: underline; }
    .fs-list {
      flex: 1;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .fs-list li {
      padding: 6px 4px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .fs-list li:hover { background: transparent; }
    .fs-list li:hover .name,
    .fs-list li:hover .size { color: var(--accent); }
    .fs-list .name { color: var(--fg); }
    .fs-list .dir .name::before { content: "▸ "; color: var(--accent); }
    .fs-list .file .name::before { content: "· "; color: var(--muted); }
    .fs-list .size { color: var(--muted); font-size: 11px; }
    .fs-list .empty {
      color: var(--muted);
      font-style: italic;
      padding: 12px 4px;
      cursor: default;
    }
    .fs-list .empty:hover { background: transparent; }
    .fs-viewer {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-top: 10px;
      padding: 10px 12px;
      max-height: 240px;
      overflow: auto;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .fs-viewer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted);
    }
    .fs-viewer-header .close-viewer {
      background: transparent;
      color: var(--muted);
      border: 0;
      padding: 0;
      cursor: pointer;
      font: inherit;
    }
    .fs-viewer-header .close-viewer:hover { color: var(--fg); }
    .fs-viewer-actions { display: flex; gap: 6px; }
    textarea.fs-editor {
      min-height: 240px;
      max-height: 480px;
      resize: vertical;
      width: 100%;
      border-color: var(--accent);
      background: var(--bg);
      color: var(--fg);
      font: 12px ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;
    }
  </style>
</head>
