[package]
name = "localharness"
version = "0.2.0"
edition = "2024"
license = "Apache-2.0"
description = "A Rust-native agent SDK for Gemini. Streaming, custom tools, safety policies, background triggers — zero external binaries."
repository = "https://github.com/compusophy/localharness"
documentation = "https://docs.rs/localharness"
readme = "README.md"
keywords = ["agent", "ai", "gemini", "llm", "sdk"]
categories = ["api-bindings", "asynchronous"]
rust-version = "1.85"
exclude = [
    "UPSTREAM.md",
    "DESIGN.md",
    "RELEASING.md",
    "CHANGELOG.md",
    "scripts/**",
    ".github/**",
]

[dependencies]
tokio = { version = "1.42", features = [
    "macros",
    "rt-multi-thread",
    "sync",
    "process",
    "io-util",
    "time",
    "fs",
] }
tokio-stream = { version = "0.1", features = ["sync"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
futures-util = { version = "0.3", default-features = false, features = ["std", "sink"] }
futures-core = "0.3"
thiserror = "1"
tracing = "0.1"
bytes = "1"
parking_lot = "0.12"
dunce = "1.0"
arc-swap = "1"
base64 = "0.22"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "stream"] }
uuid = { version = "1", features = ["v4"] }
url = "2"
walkdir = "2"
globset = "0.4"
regex = "1"
tempfile = "3"

[dev-dependencies]
tokio = { version = "1.42", features = ["macros", "rt-multi-thread", "test-util"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[[example]]
name = "smoke"
path = "examples/test_agent.rs"

[[example]]
name = "text_chat"
path = "examples/text_chat.rs"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true
panic = "abort"
