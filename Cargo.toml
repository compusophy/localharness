[package]
name = "localharness"
version = "0.5.0"
edition = "2024"
license = "Apache-2.0"
description = "A Rust-native agent SDK for Gemini. Streaming, custom tools, safety policies, background triggers — zero external binaries."
repository = "https://github.com/compusophy/localharness"
documentation = "https://docs.rs/localharness"
readme = "README.md"
keywords = ["agent", "ai", "gemini", "llm", "sdk"]
categories = ["api-bindings", "asynchronous"]
rust-version = "1.85"
exclude = [
    "UPSTREAM.md",
    "DESIGN.md",
    "RELEASING.md",
    "CHANGELOG.md",
    "scripts/**",
    ".github/**",
    "localharness-web/**",
    "web/**",
    "vercel.json",
    ".vercelignore",
    ".env",
    ".env.*",
    ".env.example",
    "CLAUDE.md",
]

[features]
default = ["native"]
# `native` enables the parts of the crate that require an OS: subprocess
# spawning (run_command, MCP stdio bridge), tokio multi-thread runtime,
# and the filesystem-shaped builtins. wasm32 callers should depend with
# `default-features = false` to strip these.
native = [
    "dep:walkdir",
    "dep:tempfile",
    "tokio/rt-multi-thread",
    "tokio/process",
    "tokio/fs",
    "tokio/io-util",
]

[dependencies]
tokio = { version = "1.42", default-features = false, features = [
    "macros",
    "sync",
    "time",
    "rt",
] }
tokio-stream = { version = "0.1", features = ["sync"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
futures-util = { version = "0.3", default-features = false, features = ["std", "sink"] }
futures-core = "0.3"
thiserror = "1"
tracing = "0.1"
bytes = "1"
parking_lot = "0.12"
dunce = "1.0"
arc-swap = "1"
base64 = "0.22"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "stream"] }
uuid = { version = "1", features = ["v4"] }
url = "2"
walkdir = { version = "2", optional = true }
globset = "0.4"
regex = "1"
tempfile = { version = "3", optional = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
uuid = { version = "1", features = ["js"] }
getrandom = { version = "0.2", features = ["js"] }
wasm-bindgen-futures = "0.4"

[dev-dependencies]
tokio = { version = "1.42", features = ["macros", "rt-multi-thread", "test-util"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[[example]]
name = "smoke"
path = "examples/test_agent.rs"

[[example]]
name = "text_chat"
path = "examples/text_chat.rs"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true
panic = "abort"
