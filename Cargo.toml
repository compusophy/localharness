[package]
name = "localharness"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "Unofficial Rust client SDK for the `localharness` agent runtime (Google Antigravity)."
repository = "https://github.com/compusophy/localharness"
documentation = "https://docs.rs/localharness"
readme = "README.md"
keywords = ["agent", "ai", "gemini", "llm", "sdk"]
categories = ["api-bindings", "asynchronous"]
rust-version = "1.85"
exclude = [
    "upstream/**",
    ".kokoro/**",
    ".github/**",
    "google/**",
    "skills/**",
    "examples/getting_started/**",
    "examples/deep_dives/**",
    "examples/resources/**",
    "examples/README.md",
    "pyproject.toml",
    "CODE_OF_CONDUCT.md",
    "CONTRIBUTING.md",
    "SECURITY.md",
    "PYTHON_README.md",
    "UPSTREAM.md",
    "scripts/**",
]

[dependencies]
tokio = { version = "1.42", features = [
    "macros",
    "rt-multi-thread",
    "sync",
    "process",
    "io-util",
    "net",
    "time",
    "fs",
    "signal",
] }
tokio-tungstenite = { version = "0.20", features = ["rustls-tls-webpki-roots"] }
tokio-stream = { version = "0.1", features = ["sync"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
prost = "0.12"
prost-types = "0.12"
async-trait = "0.1"
futures-util = { version = "0.3", default-features = false, features = ["std", "sink"] }
futures-core = "0.3"
thiserror = "1"
tracing = "0.1"
bytes = "1"
parking_lot = "0.12"
dunce = "1.0"
path-clean = "1.0"
arc-swap = "1"
base64 = "0.22"

[dev-dependencies]
tokio = { version = "1.42", features = ["macros", "rt-multi-thread", "test-util"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[[example]]
name = "smoke"
path = "examples/test_agent.rs"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true
panic = "abort"
